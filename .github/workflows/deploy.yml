name: Deploy Customer Management App

on:
  workflow_dispatch:
permissions:
  id-token: write  
  contents: read    
  
env:
  COMPOSE_PROJECT_NAME: app
  LOCAL_IMAGE_NAME: app-app:latest
  ECR_REPOSITORY_NAME: customermanagementapp
  DB_SQL_FILE: db/db_health.sql


jobs:
  create-ecr:
    runs-on: ubuntu-latest

    outputs:
      aws_region: ${{ steps.ecr.outputs.aws_region }}
      repository_url: ${{ steps.ecr.outputs.repository_url }}
      registry_url: ${{ steps.ecr.outputs.registry_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform apply ECR
        working-directory: terraform/01-ecr
        run: |
          terraform init
          terraform apply -auto-approve

      - name: Read ECR outputs
        id: ecr
        working-directory: terraform/01-ecr
        run: |
          echo "aws_region=$(terraform output -raw aws_region)" >> "$GITHUB_OUTPUT"
          echo "repository_url=$(terraform output -raw repository_url)" >> "$GITHUB_OUTPUT"
          echo "registry_url=$(terraform output -raw registry_url)" >> "$GITHUB_OUTPUT"

  build-and-push:
    runs-on: ubuntu-latest
    needs: create-ecr

    outputs:
      image_uri: ${{ steps.image.outputs.image_uri }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ needs.create-ecr.outputs.aws_region }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region "${{ needs.create-ecr.outputs.aws_region }}" \
            | docker login \
              --username AWS \
              --password-stdin "${{ needs.create-ecr.outputs.registry_url }}"

      - name: Build Docker image with Docker Compose
        run: |
          docker compose up --build -d
          docker image inspect "$LOCAL_IMAGE_NAME"

      - name: Tag and push Docker image
        id: image
        run: |
          IMAGE_URI="${{ needs.create-ecr.outputs.repository_url }}:latest"

          docker tag "$LOCAL_IMAGE_NAME" "$IMAGE_URI"
          docker push "$IMAGE_URI"

          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

  deploy-app:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform apply app infrastructure
        working-directory: terraform/02-app
        env:
          TF_VAR_image_uri: ${{ needs.build-and-push.outputs.image_uri }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
        run: |
          terraform init
          terraform apply -auto-approve

      - name: Read Terraform app outputs
        id: app
        working-directory: terraform/02-app
        run: |
          echo "aws_region=$(terraform output -raw aws_region)" >> "$GITHUB_OUTPUT"
          echo "ec2_instance_id=$(terraform output -raw ec2_instance_id)" >> "$GITHUB_OUTPUT"
          echo "rds_endpoint=$(terraform output -raw rds_endpoint)" >> "$GITHUB_OUTPUT"
          echo "db_secret_arn=$(terraform output -raw db_secret_arn)" >> "$GITHUB_OUTPUT"
          echo "db_name=$(terraform output -raw db_name)" >> "$GITHUB_OUTPUT"
          echo "db_username=$(terraform output -raw db_username)" >> "$GITHUB_OUTPUT"

      - name: Wait for EC2 SSM to become online
        env:
          AWS_REGION: ${{ steps.app.outputs.aws_region }}
          EC2_INSTANCE_ID: ${{ steps.app.outputs.ec2_instance_id }}
        run: |
          set -euo pipefail

          for i in {1..30}; do
            STATUS=$(aws ssm describe-instance-information \
              --region "$AWS_REGION" \
              --filters "Key=InstanceIds,Values=$EC2_INSTANCE_ID" \
              --query 'InstanceInformationList[0].PingStatus' \
              --output text 2>/dev/null || true)

            if [ "$STATUS" = "Online" ]; then
              echo "EC2 instance is online in SSM."
              exit 0
            fi

            echo "Current SSM status: $STATUS"
            sleep 10
          done

          echo "EC2 instance did not become Online in SSM."
          exit 1

      - name: Install MariaDB client, create DB, upload SQL, and import
        env:
          AWS_REGION: ${{ steps.app.outputs.aws_region }}
          EC2_INSTANCE_ID: ${{ steps.app.outputs.ec2_instance_id }}
          RDS_ENDPOINT: ${{ steps.app.outputs.rds_endpoint }}
          DB_SECRET_ARN: ${{ steps.app.outputs.db_secret_arn }}
          DB_NAME: ${{ steps.app.outputs.db_name }}
          DB_USERNAME: ${{ steps.app.outputs.db_username }}
        run: |
          set -euo pipefail

          if [ ! -f "$DB_SQL_FILE" ]; then
            echo "SQL file not found: $DB_SQL_FILE"
            exit 1
          fi

          run_ssm_params_file() {
            local comment="$1"
            local params_file="$2"

            COMMAND_ID=$(aws ssm send-command \
              --region "$AWS_REGION" \
              --instance-ids "$EC2_INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --comment "$comment" \
              --parameters "file://$params_file" \
              --query 'Command.CommandId' \
              --output text)

            set +e
            aws ssm wait command-executed \
              --region "$AWS_REGION" \
              --command-id "$COMMAND_ID" \
              --instance-id "$EC2_INSTANCE_ID"
            WAIT_STATUS=$?
            set -e

            aws ssm get-command-invocation \
              --region "$AWS_REGION" \
              --command-id "$COMMAND_ID" \
              --instance-id "$EC2_INSTANCE_ID" \
              --query '{Status:Status,Stdout:StandardOutputContent,Stderr:StandardErrorContent}' \
              --output json

            if [ "$WAIT_STATUS" -ne 0 ]; then
              exit "$WAIT_STATUS"
            fi
          }

          make_params_file() {
            local params_file="$1"
            shift
            python3 - "$params_file" "$@" <<'PY'
          import json
          import sys

          params_file = sys.argv[1]
          commands = list(sys.argv[2:])
          with open(params_file, "w", encoding="utf-8") as f:
              json.dump({"commands": commands}, f)
          PY
          }

          upload_file_to_ec2() {
            local local_file="$1"
            local remote_file="$2"
            local remote_b64="${remote_file}.b64"
            local tmp_dir
            tmp_dir=$(mktemp -d)

            base64 -w 0 "$local_file" > "$tmp_dir/file.b64"
            split -b 6000 "$tmp_dir/file.b64" "$tmp_dir/chunk_"

            make_params_file "$tmp_dir/clear.json" \
              "set -euo pipefail" \
              "rm -f '$remote_b64' '$remote_file'"
            run_ssm_params_file "Clear remote file $remote_file" "$tmp_dir/clear.json"

            for chunk in "$tmp_dir"/chunk_*; do
              python3 - "$chunk" "$remote_b64" "$tmp_dir/append.json" <<'PY'
          import json
          import pathlib
          import sys

          chunk_file = pathlib.Path(sys.argv[1])
          remote_b64 = sys.argv[2]
          params_file = sys.argv[3]
          content = chunk_file.read_text(encoding="utf-8")
          command = f"cat >> '{remote_b64}' <<'EOF'\n{content}\nEOF"
          with open(params_file, "w", encoding="utf-8") as f:
              json.dump({"commands": ["set -euo pipefail", command]}, f)
          PY
              run_ssm_params_file "Upload chunk to $remote_file" "$tmp_dir/append.json"
            done

            make_params_file "$tmp_dir/decode.json" \
              "set -euo pipefail" \
              "base64 -d '$remote_b64' > '$remote_file'" \
              "chmod 600 '$remote_file'" \
              "rm -f '$remote_b64'"
            run_ssm_params_file "Decode remote file $remote_file" "$tmp_dir/decode.json"
          }

          cat > /tmp/create-db.sh <<'SCRIPT'
          #!/bin/bash
          set -euo pipefail

          export AWS_DEFAULT_REGION="__AWS_REGION__"
          RDS_ENDPOINT="__RDS_ENDPOINT__"
          DB_SECRET_ARN="__DB_SECRET_ARN__"
          DB_NAME="__DB_NAME__"
          DB_USERNAME="__DB_USERNAME__"

          sudo dnf install -y awscli mariadb105 || sudo dnf install -y awscli mariadb || sudo yum install -y awscli mariadb

          SECRET_JSON="$(aws secretsmanager get-secret-value --secret-id "$DB_SECRET_ARN" --query SecretString --output text)"
          DB_PASSWORD="$(SECRET_JSON="$SECRET_JSON" python3 -c 'import json, os; print(json.loads(os.environ["SECRET_JSON"])["password"])')"

          mysql -h "$RDS_ENDPOINT" -u "$DB_USERNAME" -p"$DB_PASSWORD" -e "CREATE DATABASE IF NOT EXISTS \`$DB_NAME\`;"
          SCRIPT

          sed -i \
            -e "s|__AWS_REGION__|$AWS_REGION|g" \
            -e "s|__RDS_ENDPOINT__|$RDS_ENDPOINT|g" \
            -e "s|__DB_SECRET_ARN__|$DB_SECRET_ARN|g" \
            -e "s|__DB_NAME__|$DB_NAME|g" \
            -e "s|__DB_USERNAME__|$DB_USERNAME|g" \
            /tmp/create-db.sh

          upload_file_to_ec2 /tmp/create-db.sh /tmp/create-db.sh
          make_params_file /tmp/run-create-db.json \
            "set -euo pipefail" \
            "chmod +x /tmp/create-db.sh" \
            "sudo /tmp/create-db.sh"
          run_ssm_params_file "Install MariaDB and create database" /tmp/run-create-db.json

          upload_file_to_ec2 "$DB_SQL_FILE" /tmp/db_health.sql

          cat > /tmp/import-db.sh <<'SCRIPT'
          #!/bin/bash
          set -euo pipefail

          export AWS_DEFAULT_REGION="__AWS_REGION__"
          RDS_ENDPOINT="__RDS_ENDPOINT__"
          DB_SECRET_ARN="__DB_SECRET_ARN__"
          DB_NAME="__DB_NAME__"
          DB_USERNAME="__DB_USERNAME__"

          SECRET_JSON="$(aws secretsmanager get-secret-value --secret-id "$DB_SECRET_ARN" --query SecretString --output text)"
          DB_PASSWORD="$(SECRET_JSON="$SECRET_JSON" python3 -c 'import json, os; print(json.loads(os.environ["SECRET_JSON"])["password"])')"

          mysql -h "$RDS_ENDPOINT" -u "$DB_USERNAME" -p"$DB_PASSWORD" "$DB_NAME" < /tmp/db_health.sql
          SCRIPT

          sed -i \
            -e "s|__AWS_REGION__|$AWS_REGION|g" \
            -e "s|__RDS_ENDPOINT__|$RDS_ENDPOINT|g" \
            -e "s|__DB_SECRET_ARN__|$DB_SECRET_ARN|g" \
            -e "s|__DB_NAME__|$DB_NAME|g" \
            -e "s|__DB_USERNAME__|$DB_USERNAME|g" \
            /tmp/import-db.sh

          upload_file_to_ec2 /tmp/import-db.sh /tmp/import-db.sh
          make_params_file /tmp/run-import-db.json \
            "set -euo pipefail" \
            "chmod +x /tmp/import-db.sh" \
            "sudo /tmp/import-db.sh"
          run_ssm_params_file "Import db/db_health.sql into RDS" /tmp/run-import-db.json
