name: Destroy Customer Management App

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  TF_STATE_BUCKET: cma02-tfstate-${{ github.repository_owner }}
  ECR_REPOSITORY_NAME: customermanagementapp
  INSTANCE_PROFILE_NAME: ec2-ssm-profile
  IAM_ROLE_NAME: ec2-ssm-role
  DB_SECRET_ID: db-health-connection-sandbox-01

jobs:
  destroy-app:
    runs-on: ubuntu-latest

    outputs:
      tf_state_bucket: ${{ steps.tfstate.outputs.bucket_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Resolve Terraform state bucket
        id: tfstate
        run: |
          set -euo pipefail

          BUCKET_NAME=$(echo "${TF_STATE_BUCKET}" | tr '[:upper:]' '[:lower:]' | tr '_' '-')

          echo "Using Terraform state bucket: $BUCKET_NAME"
          echo "bucket_name=$BUCKET_NAME" >> "$GITHUB_OUTPUT"

          if ! aws s3api head-bucket --bucket "$BUCKET_NAME" 2>/dev/null; then
            echo "Terraform state bucket does not exist: $BUCKET_NAME"
            echo "Nothing to destroy from Terraform state."
            exit 1
          fi

      - name: Force delete Secrets Manager secret
        run: |
          set -euo pipefail

          if aws secretsmanager describe-secret \
            --secret-id "$DB_SECRET_ID" \
            --region "$AWS_REGION" >/dev/null 2>&1; then

            echo "Force deleting secret: $DB_SECRET_ID"

            aws secretsmanager delete-secret \
              --secret-id "$DB_SECRET_ID" \
              --force-delete-without-recovery \
              --region "$AWS_REGION"
          else
            echo "Secret does not exist or is already deleted: $DB_SECRET_ID"
          fi
          
      - name: Scale ECS service down before destroy
        run: |
          set -euo pipefail

          aws ecs update-service \
            --cluster healthcare-ecs-cluster \
            --service healthcare-fargate-service \
            --desired-count 0 \
            --region us-east-1 || true

          TASKS=$(aws ecs list-tasks \
            --cluster healthcare-ecs-cluster \
            --service-name healthcare-fargate-service \
            --region us-east-1 \
            --query 'taskArns[]' \
            --output text || true)

          if [ -n "$TASKS" ] && [ "$TASKS" != "None" ]; then
            for TASK in $TASKS; do
              aws ecs stop-task \
                --cluster healthcare-ecs-cluster \
                --task "$TASK" \
                --reason "Pre Terraform destroy cleanup" \
                --region us-east-1 || true
            done
          fi

          aws ecs wait services-stable \
            --cluster healthcare-ecs-cluster \
            --services healthcare-fargate-service \
            --region us-east-1 || true
            
      - name: Terraform destroy app infrastructure
        working-directory: terraform/02-app
        env:
          TF_VAR_image_uri: placeholder
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
        run: |
          set -euo pipefail

          terraform init \
            -backend-config="bucket=${{ steps.tfstate.outputs.bucket_name }}" \
            -backend-config="key=customermanagementapp/app/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="use_lockfile=true"

          terraform destroy -auto-approve

      - name: Detach role from instance profile
        if: always()
        run: |
          set -euo pipefail

          if aws iam get-instance-profile \
            --instance-profile-name "$INSTANCE_PROFILE_NAME" >/dev/null 2>&1; then

            echo "Checking whether role $IAM_ROLE_NAME is attached to profile $INSTANCE_PROFILE_NAME..."

            ATTACHED_ROLE=$(aws iam get-instance-profile \
              --instance-profile-name "$INSTANCE_PROFILE_NAME" \
              --query "InstanceProfile.Roles[?RoleName=='$IAM_ROLE_NAME'].RoleName | [0]" \
              --output text)

            if [ "$ATTACHED_ROLE" = "$IAM_ROLE_NAME" ]; then
              echo "Detaching role from instance profile..."

              aws iam remove-role-from-instance-profile \
                --instance-profile-name "$INSTANCE_PROFILE_NAME" \
                --role-name "$IAM_ROLE_NAME"
            else
              echo "Role is not attached to the instance profile."
            fi
          else
            echo "Instance profile does not exist: $INSTANCE_PROFILE_NAME"
          fi

      - name: Delete instance profile
        if: always()
        run: |
          set -euo pipefail

          if aws iam get-instance-profile \
            --instance-profile-name "$INSTANCE_PROFILE_NAME" >/dev/null 2>&1; then

            echo "Deleting instance profile: $INSTANCE_PROFILE_NAME"

            aws iam delete-instance-profile \
              --instance-profile-name "$INSTANCE_PROFILE_NAME"
          else
            echo "Instance profile already deleted or does not exist: $INSTANCE_PROFILE_NAME"
          fi

      - name: Delete IAM role
        if: always()
        run: |
          set -euo pipefail

          if aws iam get-role \
            --role-name "$IAM_ROLE_NAME" >/dev/null 2>&1; then

            echo "Deleting IAM role: $IAM_ROLE_NAME"

            aws iam delete-role \
              --role-name "$IAM_ROLE_NAME"
          else
            echo "IAM role already deleted or does not exist: $IAM_ROLE_NAME"
          fi

  destroy-ecr:
    runs-on: ubuntu-latest
    needs: destroy-app
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Resolve Terraform state bucket
        id: tfstate
        run: |
          set -euo pipefail

          BUCKET_NAME=$(echo "${TF_STATE_BUCKET}" | tr '[:upper:]' '[:lower:]' | tr '_' '-')

          echo "Using Terraform state bucket: $BUCKET_NAME"
          echo "bucket_name=$BUCKET_NAME" >> "$GITHUB_OUTPUT"

          if ! aws s3api head-bucket --bucket "$BUCKET_NAME" 2>/dev/null; then
            echo "Terraform state bucket does not exist: $BUCKET_NAME"
            echo "Skipping ECR Terraform destroy."
            exit 0
          fi

      - name: Empty ECR repository before destroy
        run: |
          set -euo pipefail

          if aws ecr describe-repositories \
            --repository-names "$ECR_REPOSITORY_NAME" \
            --region "$AWS_REGION" >/dev/null 2>&1; then

            IMAGE_IDS=$(aws ecr list-images \
              --repository-name "$ECR_REPOSITORY_NAME" \
              --region "$AWS_REGION" \
              --query 'imageIds' \
              --output json)

            if [ "$IMAGE_IDS" != "[]" ]; then
              echo "Deleting images from ECR repository: $ECR_REPOSITORY_NAME"

              aws ecr batch-delete-image \
                --repository-name "$ECR_REPOSITORY_NAME" \
                --region "$AWS_REGION" \
                --image-ids "$IMAGE_IDS"
            else
              echo "ECR repository is already empty."
            fi
          else
            echo "ECR repository does not exist: $ECR_REPOSITORY_NAME"
          fi

      - name: Terraform destroy ECR
        working-directory: terraform/01-ecr
        run: |
          set -euo pipefail

          terraform init \
            -backend-config="bucket=${{ steps.tfstate.outputs.bucket_name }}" \
            -backend-config="key=customermanagementapp/ecr/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="use_lockfile=true"

          terraform destroy -auto-approve
