name: Destroy the all deployment

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  TF_STATE_BUCKET: cma02-tfstate-${{ github.repository_owner }}
  ECR_REPOSITORY_NAME: customermanagementapp
  INSTANCE_PROFILE_NAME: ec2-ssm-profile
  IAM_ROLE_NAME: ec2-ssm-role
  DB_SECRET_ID: db-health-connection-sandbox-01

jobs:
  destroy-app:
    runs-on: ubuntu-latest

    outputs:
      tf_state_bucket: ${{ steps.tfstate.outputs.bucket_name }}
      bucket_exists: ${{ steps.tfstate.outputs.bucket_exists }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Resolve Terraform state bucket
        id: tfstate
        run: |
          set -euo pipefail

          BUCKET_NAME=$(echo "${TF_STATE_BUCKET}" | tr '[:upper:]' '[:lower:]' | tr '_' '-')

          echo "Using Terraform state bucket: $BUCKET_NAME"
          echo "bucket_name=$BUCKET_NAME" >> "$GITHUB_OUTPUT"

          if aws s3api head-bucket --bucket "$BUCKET_NAME" 2>/dev/null; then
            echo "bucket_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "Terraform state bucket does not exist: $BUCKET_NAME"
            echo "bucket_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Force delete Secrets Manager secret
        if: steps.tfstate.outputs.bucket_exists == 'true'
        run: |
          set -euo pipefail

          if aws secretsmanager describe-secret \
            --secret-id "$DB_SECRET_ID" \
            --region "$AWS_REGION" >/dev/null 2>&1; then

            echo "Force deleting secret: $DB_SECRET_ID"

            aws secretsmanager delete-secret \
              --secret-id "$DB_SECRET_ID" \
              --force-delete-without-recovery \
              --region "$AWS_REGION"
          else
            echo "Secret does not exist or is already deleted: $DB_SECRET_ID"
          fi

      - name: Terraform destroy app infrastructure
        if: steps.tfstate.outputs.bucket_exists == 'true'
        working-directory: terraform/infrastructure
        env:
          TF_VAR_image_uri: placeholder
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
        run: |
          set -euo pipefail

          terraform init \
            -backend-config="bucket=${{ steps.tfstate.outputs.bucket_name }}" \
            -backend-config="key=customermanagementapp/app/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="use_lockfile=true"

          terraform destroy -auto-approve

      - name: Detach role from instance profile
        if: always()
        run: |
          set -euo pipefail

          if aws iam get-instance-profile \
            --instance-profile-name "$INSTANCE_PROFILE_NAME" >/dev/null 2>&1; then

            echo "Checking whether role $IAM_ROLE_NAME is attached to profile $INSTANCE_PROFILE_NAME..."

            ATTACHED_ROLE=$(aws iam get-instance-profile \
              --instance-profile-name "$INSTANCE_PROFILE_NAME" \
              --query "InstanceProfile.Roles[?RoleName=='$IAM_ROLE_NAME'].RoleName | [0]" \
              --output text)

            if [ "$ATTACHED_ROLE" = "$IAM_ROLE_NAME" ]; then
              echo "Detaching role from instance profile..."

              aws iam remove-role-from-instance-profile \
                --instance-profile-name "$INSTANCE_PROFILE_NAME" \
                --role-name "$IAM_ROLE_NAME"
            else
              echo "Role is not attached to the instance profile."
            fi
          else
            echo "Instance profile does not exist: $INSTANCE_PROFILE_NAME"
          fi

      - name: Delete instance profile
        if: always()
        run: |
          set -euo pipefail

          if aws iam get-instance-profile \
            --instance-profile-name "$INSTANCE_PROFILE_NAME" >/dev/null 2>&1; then

            echo "Deleting instance profile: $INSTANCE_PROFILE_NAME"

            aws iam delete-instance-profile \
              --instance-profile-name "$INSTANCE_PROFILE_NAME"
          else
            echo "Instance profile already deleted or does not exist: $INSTANCE_PROFILE_NAME"
          fi

      - name: Delete IAM role
        if: always()
        run: |
          set -euo pipefail

          if aws iam get-role \
            --role-name "$IAM_ROLE_NAME" >/dev/null 2>&1; then

            echo "Deleting IAM role: $IAM_ROLE_NAME"

            aws iam delete-role \
              --role-name "$IAM_ROLE_NAME"
          else
            echo "IAM role already deleted or does not exist: $IAM_ROLE_NAME"
          fi

  destroy-ecr:
    runs-on: ubuntu-latest
    needs: destroy-app
    if: always()

    outputs:
      tf_state_bucket: ${{ steps.tfstate.outputs.bucket_name }}
      bucket_exists: ${{ steps.tfstate.outputs.bucket_exists }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Resolve Terraform state bucket
        id: tfstate
        run: |
          set -euo pipefail

          BUCKET_NAME=$(echo "${TF_STATE_BUCKET}" | tr '[:upper:]' '[:lower:]' | tr '_' '-')

          echo "Using Terraform state bucket: $BUCKET_NAME"
          echo "bucket_name=$BUCKET_NAME" >> "$GITHUB_OUTPUT"

          if aws s3api head-bucket --bucket "$BUCKET_NAME" 2>/dev/null; then
            echo "bucket_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "Terraform state bucket does not exist: $BUCKET_NAME"
            echo "bucket_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Empty ECR repository before destroy
        if: steps.tfstate.outputs.bucket_exists == 'true'
        run: |
          set -euo pipefail

          if aws ecr describe-repositories \
            --repository-names "$ECR_REPOSITORY_NAME" \
            --region "$AWS_REGION" >/dev/null 2>&1; then

            IMAGE_IDS=$(aws ecr list-images \
              --repository-name "$ECR_REPOSITORY_NAME" \
              --region "$AWS_REGION" \
              --query 'imageIds' \
              --output json)

            if [ "$IMAGE_IDS" != "[]" ]; then
              echo "Deleting images from ECR repository: $ECR_REPOSITORY_NAME"

              aws ecr batch-delete-image \
                --repository-name "$ECR_REPOSITORY_NAME" \
                --region "$AWS_REGION" \
                --image-ids "$IMAGE_IDS"
            else
              echo "ECR repository is already empty."
            fi
          else
            echo "ECR repository does not exist: $ECR_REPOSITORY_NAME"
          fi

      - name: Terraform destroy ECR
        if: steps.tfstate.outputs.bucket_exists == 'true'
        working-directory: terraform/ecs-service
        run: |
          set -euo pipefail

          terraform init \
            -backend-config="bucket=${{ steps.tfstate.outputs.bucket_name }}" \
            -backend-config="key=customermanagementapp/ecr/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="use_lockfile=true"

          terraform destroy -auto-approve

  delete-tf-state-bucket:
    runs-on: ubuntu-latest
    needs:
      - destroy-app
      - destroy-ecr
    if: always()

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

      - name: Empty and delete Terraform state bucket
        run: |
          set -euo pipefail

          BUCKET_NAME=$(echo "${TF_STATE_BUCKET}" | tr '[:upper:]' '[:lower:]' | tr '_' '-')

          if ! aws s3api head-bucket --bucket "$BUCKET_NAME" 2>/dev/null; then
            echo "Terraform state bucket does not exist: $BUCKET_NAME"
            exit 0
          fi

          echo "Emptying Terraform state bucket, including object versions and delete markers: $BUCKET_NAME"

          while true; do
            VERSION_DELETE_FILE=$(mktemp)
            MARKER_DELETE_FILE=$(mktemp)

            aws s3api list-object-versions \
              --bucket "$BUCKET_NAME" \
              --query '{Objects: Versions[].{Key:Key,VersionId:VersionId}}' \
              --output json > "$VERSION_DELETE_FILE"

            aws s3api list-object-versions \
              --bucket "$BUCKET_NAME" \
              --query '{Objects: DeleteMarkers[].{Key:Key,VersionId:VersionId}}' \
              --output json > "$MARKER_DELETE_FILE"

            VERSION_COUNT=$(python3 -c 'import json,sys; data=json.load(open(sys.argv[1])); print(len(data.get("Objects") or []))' "$VERSION_DELETE_FILE")
            MARKER_COUNT=$(python3 -c 'import json,sys; data=json.load(open(sys.argv[1])); print(len(data.get("Objects") or []))' "$MARKER_DELETE_FILE")

            if [ "$VERSION_COUNT" -eq 0 ] && [ "$MARKER_COUNT" -eq 0 ]; then
              rm -f "$VERSION_DELETE_FILE" "$MARKER_DELETE_FILE"
              break
            fi

            if [ "$VERSION_COUNT" -gt 0 ]; then
              echo "Deleting $VERSION_COUNT object version(s)..."
              aws s3api delete-objects \
                --bucket "$BUCKET_NAME" \
                --delete "file://$VERSION_DELETE_FILE"
            fi

            if [ "$MARKER_COUNT" -gt 0 ]; then
              echo "Deleting $MARKER_COUNT delete marker(s)..."
              aws s3api delete-objects \
                --bucket "$BUCKET_NAME" \
                --delete "file://$MARKER_DELETE_FILE"
            fi

            rm -f "$VERSION_DELETE_FILE" "$MARKER_DELETE_FILE"
          done

          echo "Deleting Terraform state bucket: $BUCKET_NAME"

          aws s3api delete-bucket \
            --bucket "$BUCKET_NAME" \
            --region "$AWS_REGION"

          echo "Terraform state bucket deleted: $BUCKET_NAME"
